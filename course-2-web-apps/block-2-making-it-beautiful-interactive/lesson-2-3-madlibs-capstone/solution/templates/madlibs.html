<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Web Mad-Libs</title>
</head>
<body>
    <h1>Web Mad-Libs</h1>
    <p>Fill in the blanks and click <strong>Create Story</strong>.</p>

    <form method="post">
        <p>
            <label>Adjective: <input type="text" name="adjective" placeholder="silly"></label>
        </p>
        <p>
            <label>Noun: <input type="text" name="noun" placeholder="robot"></label>
        </p>
        <p>
            <label>Verb: <input type="text" name="verb" placeholder="dance"></label>
        </p>
        <p>
            <label>Place: <input type="text" name="place" placeholder="the moon"></label>
        </p>
        <button type="submit">Create Story</button>
    </form>

    {% if story %}
    <h2>Your Story</h2>
    <p>{{ story }}</p>
    {% endif %}
</body>
</html>
